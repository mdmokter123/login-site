<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Panel</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  background: url('bacround.jpg') no-repeat center;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 320px;
  background: rgba(0,0,0,0.5);
  padding: 30px;
  border-radius: 15px;
  color: white;
  backdrop-filter: blur(10px);
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: transparent;
  border: 1px solid #ccc;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  background: #4fc3dc;
  border: none;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #00acc1;
}

.link {
  text-align: center;
  cursor: pointer;
  color: #4fc3dc;
}

.forgot-btn {
  background: red;
  margin-top: 10px;
}

.whatsapp {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: black;
  color: white;
  padding: 8px;
  border-radius: 20px;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginForm">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>

    <div class="link" onclick="showRegister()">Create Account</div>

    <button class="forgot-btn" onclick="resetPassword()">
      Forgot Password
    </button>
  </div>

  <!-- REGISTER -->
  <div id="registerForm" style="display:none;">
    <h2>Create Account</h2>
    <input type="text" id="regName" placeholder="Full Name">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Password">
    <button onclick="register()">Register</button>

    <div class="link" onclick="showLogin()">Back to Login</div>
  </div>

</div>

<div class="whatsapp" onclick="openWhatsApp()">
  WhatsApp
</div>

<script>
// ⚠️ এখানে Firebase Config বসাও
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Form toggle
function showRegister(){
  document.getElementById("loginForm").style.display="none";
  document.getElementById("registerForm").style.display="block";
}
function showLogin(){
  document.getElementById("loginForm").style.display="block";
  document.getElementById("registerForm").style.display="none";
}

// Register
function register(){
  let name = document.getElementById("regName").value;
  let email = document.getElementById("regEmail").value;
  let pass = document.getElementById("regPassword").value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(user=>{
    user.user.updateProfile({displayName:name});
    alert("Account created");
    showLogin();
  })
  .catch(err=>alert(err.message));
}

// Login
function login(){
  let email = document.getElementById("loginEmail").value;
  let pass = document.getElementById("loginPassword").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(user=>{
    alert("Welcome "+user.user.displayName);
  })
  .catch(err=>alert(err.message));
}

// Forgot password
function resetPassword(){
  let email = document.getElementById("loginEmail").value;
  if(!email){
    alert("Enter email first");
    return;
  }

  auth.sendPasswordResetEmail(email)
  .then(()=>alert("Reset email sent"))
  .catch(err=>alert(err.message));
}

// WhatsApp
function openWhatsApp(){
  window.open("https://wa.me/919332539948","_blank");
}
</script>

</body>
</html>
